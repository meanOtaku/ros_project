# -----------------------------
# LazyVim Dev
# -----------------------------
[program:dev]
priority=40
command=/bin/bash -c "source /opt/ros/jazzy/setup.bash && cd /workspace && nvim"
autostart=false
autorestart=false
stdin_open=true
tty=true
stdout_logfile=/dev/fd/1
stderr_logfile=/dev/fd/2
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0